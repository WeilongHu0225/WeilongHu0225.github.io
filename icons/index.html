<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1976d2">
    <title>贾维斯 - AI工作管家</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" href="icons/icon-512x512.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1976d2;
            --primary-light: #e3f2fd;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-dark: #333;
            --text-light: #fff;
            --border-radius: 18px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
        }
        .header {
            background: rgba(25, 118, 210, 0.95);
            color: var(--text-light);
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .header h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-text {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 14px 18px;
            margin: 0;
            border-radius: var(--border-radius);
            word-wrap: break-word;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background: var(--primary-light);
            color: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .ai-message {
            background: rgba(255,255,255,0.95);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .message-time {
            font-size: 0.75em;
            opacity: 0.7;
            margin-top: 6px;
            text-align: right;
        }
        .input-area {
            display: flex;
            padding: 16px;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.1);
            gap: 12px;
        }
        #message-input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 28px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        #message-input:focus {
            border-color: var(--primary);
        }
        #send-button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.3);
        }
        #send-button:hover {
            background: #1565c0;
        }
        #send-button:active {
            transform: scale(0.95);
        }
        .typing-indicator {
            display: none;
            background: rgba(255,255,255,0.95);
            padding: 14px 18px;
            border-radius: var(--border-radius);
            align-self: flex-start;
            margin: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        .welcome-card {
            background: rgba(255,255,255,0.95);
            padding: 24px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            margin: 20px auto;
            max-width: 90%;
        }
        .welcome-card h2 {
            color: var(--primary);
            margin-bottom: 16px;
            font-size: 1.4em;
        }
        .features-list {
            text-align: left;
            margin: 16px 0;
            padding-left: 20px;
        }
        .features-list li {
            margin: 8px 0;
            line-height: 1.4;
        }
        .usage-note {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            font-size: 0.9em;
        }
        .connection-status {
            text-align: center;
            padding: 8px;
            font-size: 0.85em;
            background: rgba(0,0,0,0.1);
            color: white;
        }
        .disconnected {
            background: rgba(255,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span class="status-indicator"></span>🤖 贾维斯</h1>
        <p class="status-text">你的AI工作管家</p>
    </div>
    
    <div class="connection-status" id="connection-status">
        💡 提示：请通过原始网页界面进行真实对话
    </div>
    
    <div class="welcome-card">
        <h2>欢迎使用贾维斯！</h2>
        <p>我是你的AI工作管家，支持以下功能：</p>
        <ul class="features-list">
            <li>• 飞书任务管理</li>
            <li>• 采购工作流程</li>
            <li>• 项目管理跟踪</li>
            <li>• 数据台账管理</li>
            <li>• 离线软件开发</li>
        </ul>
        <div class="usage-note">
            <strong>使用说明：</strong>为了获得完整功能体验，请通过原始网页界面与我对话。PWA作为备用访问渠道。
        </div>
    </div>
    
    <div class="chat-container" id="chat-container">
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="message-input" placeholder="输入你的消息..." autocomplete="off">
        <button id="send-button">➤</button>
    </div>

    <script src="sw-register.js"></script>
    <script src="app.js"></script>
</body>
</html>
